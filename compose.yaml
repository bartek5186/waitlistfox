services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: waitlistfox:latest
    container_name: waitlistfox-api
    restart: unless-stopped
    ports:
      - "${WAITLISTFOX_PORT:-8081}:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CONFIG_PATH: /app/config/config.json
      MIGRATE_ON_START: "${MIGRATE_ON_START:-false}"
      LOG_TO_FILE: "${LOG_TO_FILE:-false}"
    volumes:
      - ./config:/app/config:ro
      - ./log:/app/log
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
